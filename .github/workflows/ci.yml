name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: studymate
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: cd backend && ./gradlew :iam:test :course:test

  notify:
    needs: test
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          STATUS: ${{ needs.test.result }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          case "$STATUS" in
            success)
              EMOJI="✅"
              STATUS_TEXT="Тесты прошли — можно мерджить"
              ;;
            failure)
              EMOJI="❌"
              STATUS_TEXT="Тесты упали"
              ;;
            *)
              EMOJI="⚠️"
              STATUS_TEXT="Тесты отменены (статус: $STATUS)"
              ;;
          esac

          MESSAGE=$(printf '%s *%s*\n<%s|%s> (#%s)\n<%s|Открыть run>' \
            "$EMOJI" "$STATUS_TEXT" "$PR_URL" "$PR_TITLE" "$PR_NUMBER" "$RUN_URL")

          PAYLOAD=$(jq -n --arg text "$MESSAGE" '{text: $text}')

          curl -sf -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
