spring:
  application:
    name: studymate

  datasource:
    url: jdbc:postgresql://localhost:5432/studymate
    username: postgres
    password: ${DB_PASSWORD:postgres}

  liquibase:
    change-log: classpath:db/changelog/master.yml

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: studymate-default
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: manual

studymate:
  security:
    jwt:
      secret: ${JWT_SECRET:my-super-secret-key-that-is-at-least-32-bytes-long}
      access-token-ttl: 15m
      refresh-token-ttl: 7d
      cookie-secure: ${JWT_COOKIE_SECURE:false}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  storage:
    provider: local
    local:
      base-path: storage
  ai:
    llm:
      provider: groq   # groq | ollama | anthropic
    groq:
      base-url: https://api.groq.com/openai/v1
      api-key: ${GROQ_API_KEY:}
      default-model: llama-3.3-70b-versatile
    ollama:
      base-url: http://localhost:11434/v1
      default-model: llama3.1:8b
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    default-model: claude-sonnet-5

server:
  port: 8080

logging:
  level:
    cz.cvut.fit.studymate: DEBUG
    org.springframework.web: INFO
