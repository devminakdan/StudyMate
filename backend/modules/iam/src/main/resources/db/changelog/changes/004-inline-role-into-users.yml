databaseChangeLog:
  - changeSet:
      id: iam-004-inline-role-into-users
      author: devminakdan
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: role
                  type: varchar(50)
                  constraints:
                    nullable: true
        - sql:
            sql: >
              UPDATE users SET role = (
                SELECT ur.role FROM user_roles ur WHERE ur.user_id = users.id LIMIT 1
              )
        - sql:
            sql: >
              UPDATE users SET role = 'USER' WHERE role IS NULL
        - addNotNullConstraint:
            tableName: users
            columnName: role
            columnDataType: varchar(50)
        - dropTable:
            tableName: user_roles
