databaseChangeLog:
  - changeSet:
      id: course-001-create-courses
      author: qqrayzqq
      changes:
        - createTable:
            tableName: courses
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: owner_id
                  type: uuid
                  constraints:
                    foreignKeyName: fk_courses_owner
                    references: users(id)
                    nullable: false
              - column:
                  name: name
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: code
                  type: varchar(50)
              - column:
                  name: description
                  type: text
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
