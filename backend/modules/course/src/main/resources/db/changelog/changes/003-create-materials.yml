databaseChangeLog:
  - changeSet:
      id: course-003-create-materials
      author: qqrayzqq
      changes:
        - createTable:
            tableName: materials
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: course_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_materials_course
                    references: courses(id)
                    deleteCascade: true
              - column:
                  name: original_filename
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: storage_path
                  type: varchar(1000)
                  constraints:
                    nullable: false
              - column:
                  name: mime_type
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: size_bytes
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(50)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: error_message
                  type: text
              - column:
                  name: page_count
                  type: int
              - column:
                  name: uploaded_at
                  type: timestamp with time zone
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: processed_at
                  type: timestamp with time zone
